name: Release

# Manual, button-triggered release.
# How to release: open the Actions tab -> pick "Release" -> "Run workflow",
# type a version like v1.0.0, and click the green button.
# Regular commits and pushes do NOT trigger this — only the button does.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version for this release (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write   # required to create the tag and the release

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run smoke tests
        run: dotnet run --project PgnTools.SmokeTests/PgnTools.SmokeTests.csproj -c Release

      - name: Publish single-file win-x64 exe
        run: >
          dotnet publish PgnTools.Wpf/PgnTools.Wpf.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish_output

      - name: Name the download with the version
        shell: pwsh
        run: Copy-Item ./publish_output/PgnTools.exe "PgnTools-${{ github.event.inputs.version }}-win-x64.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: PGN Tools ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: PgnTools-${{ github.event.inputs.version }}-win-x64.exe
